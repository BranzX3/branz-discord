# BranzDiscord — the Discord storefront front-end.
#
# It runs inside the game server and talks to the shop through the central
# BranzWallet plugin (WalletApi), so there is no duplicated currency logic.

discord:
  # On a multi-backend network, enable this on EXACTLY ONE server. Two servers
  # connecting the same bot token would double every reply.
  enabled: true

  # Bot token and application id from the Discord Developer Portal.
  token: ""

  # The storefront guild. Slash commands register here instantly.
  guild-id: ""

  # Role granted after a successful /link (the "Linked" role). Optional —
  # leave blank to skip. The bot's role must sit above it in the hierarchy.
  linked-role-id: ""

# Purchasable ranks. Each buys a LuckPerms group (granted in-game, even to
# offline players) for its price in Credit, and optionally assigns a Discord
# role. duration-days: 0 = permanent, a positive value = a timed subscription.
# Requires the LuckPerms plugin. Prices are examples — tune freely.
ranks:
  vip:
    display: "VIP"
    price: 100
    luckperms-group: "vip"
    discord-role-id: ""
    duration-days: 0
  mvp:
    display: "MVP"
    price: 250
    luckperms-group: "mvp"
    discord-role-id: ""
    duration-days: 0

# Real-money top-up. /topup creates a pending order; a payment webhook settles
# it and grants Credit. Actual charging is done by your payment provider — the
# bot only creates the order and reacts to the confirmation callback.
topup:
  packages:
    starter: { display: "Starter", baht: 20,  credits: 20 }
    basic:   { display: "Basic",   baht: 50,  credits: 55 }
    value:   { display: "Value",   baht: 100, credits: 115 }
    mega:    { display: "Mega",    baht: 300, credits: 360 }
    ultra:   { display: "Ultra",   baht: 500, credits: 625 }

  webhook:
    # An HTTP endpoint that settles orders when the gateway confirms payment.
    enabled: true
    port: 8787
    path: "/webhook/topup"
    # Shared secret. The caller must send X-Signature = hex HMAC-SHA256(body).
    # Change this, keep it private, and expose the port only to the gateway.
    secret: "change-me"

  # Optional payment instructions shown to the buyer with the order reference.
  instructions: "โอนตามยอด แล้วแนบสลิป + reference ที่ห้อง support หรือรอระบบยืนยันอัตโนมัติ"
